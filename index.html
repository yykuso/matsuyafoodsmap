<h1 style="position: absolute; left: -9999px;">松屋フーズマップ - 店舗表示</h1>

<div id="map" role="application" aria-label="松屋フーズ店舗マップ"></div>

<div id="filterPanel" role="complementary" aria-label="店舗フィルター">
  <div>
    <span id="brandFilterLabel">フィルタ（AND検索）</span>
    <div id="brandFilterGroup" class="brand-filter-group" role="group" aria-labelledby="brandFilterLabel">
      <label><input type="checkbox" name="brandFilter" value="matsuya"> 松屋</label>
      <label><input type="checkbox" name="brandFilter" value="matsunoya"> 松のや</label>
      <label><input type="checkbox" name="brandFilter" value="mycurry"> マイカリー食堂</label>
      <label><input type="checkbox" name="brandFilter" value="other"> その他</label>
      <label><input type="checkbox" name="brandFilter" value="specialty"> 専門店</label>
    </div>
  </div>

  <div style="margin-top: 8px;">
    <label for="codeFilterSelect">店舗限定</label>
    <select id="codeFilterSelect" aria-label="店舗限定メニューを選択">
      <option value="all">読み込み中...</option>
    </select>
  </div>

  <div id="storeCount" aria-live="polite">表示店舗数：<span id="storeCountValue">-</span></div>
</div>
